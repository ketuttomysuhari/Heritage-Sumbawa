<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visualisasi Gaussian Splatting - CesiumJS</title>
  
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Cesium.js"></script>
  
  <style>
    /* Memastikan 3D globe memenuhi seluruh layar */
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <script>
    // =========================================================
    // PENTING: Masukkan Cesium Ion Access Token milikmu di sini
    // =========================================================
    // Tanpa token ini, Cesium tidak akan mengizinkan akses ke Asset ID 4599585.
    // Kamu bisa mendapatkannya di dashboard akun Cesium ion: https://ion.cesium.com/
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJkYTBmYjcwMS1iMWFkLTQwZmEtOTQ0ZS00ZjYwNTIyMDA0YzMiLCJpZCI6MjUyMDkzLCJpYXQiOjE3MzA0OTU2MjR9.slOIgwdmuPVT3uiTpmn_lt87ekq4MmWlyHI8tmYC0ik';

    // Inisialisasi Cesium Viewer di dalam div "cesiumContainer"
    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrain: Cesium.Terrain.fromWorldTerrain() // (Opsional) Menambahkan kontur topografi bumi
    });

    // Fungsi asinkron untuk memuat data Gaussian Splatting
    async function loadSplattingData() {
      try {
        // Memuat 3D Tileset (Gaussian Splats) dari Cesium ion
        const tileset = viewer.scene.primitives.add(
          await Cesium.Cesium3DTileset.fromIonAssetId(4599585)
        );

        // Mengarahkan kamera secara otomatis ke lokasi dataset
        await viewer.zoomTo(tileset);
        console.log("Gaussian Splatting berhasil dimuat!");
        
      } catch (error) {
        // Menampilkan pesan error di console browser jika gagal memuat
        console.error("Gagal memuat dataset Gaussian Splatting:", error);
      }
    }

    // Jalankan fungsi
    loadSplattingData();
  </script>
</body>
</html>
