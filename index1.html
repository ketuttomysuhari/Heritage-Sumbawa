<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>Minimal Gaussian Splat Test</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    /* Mengatur layar penuh tanpa margin */
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <script>
    // 1. Masukkan Access Token
    Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJjOWRmOThmYS1iYjhiLTQ4YzgtOTAzMC1hYjE5OGZmZDExMGUiLCJpZCI6MjUyMDkzLCJpYXQiOjE3MzA0MTMxMzB9.oiJJytiAc-uPwL9DTfzg-iulsz8DixZOtWrbtO1K9rI";

    // 2. Inisialisasi Viewer POLOS persis seperti di Sandcastle (tanpa opsi tambahan)
    const viewer = new Cesium.Viewer("cesiumContainer");

    // 3. Bungkus kode Sandcastle Anda ke dalam Async Function agar jalan di HTML standar
    async function loadGaussianSplat() {
      try {
        const tileset = await Cesium.Cesium3DTileset.fromIonAssetId(4599585);
        viewer.scene.primitives.add(tileset);
        
        await viewer.zoomTo(tileset);

        // Apply the default style if it exists (Sangat krusial untuk Splatting)
        const extras = tileset.asset.extras;
        if (
          Cesium.defined(extras) &&
          Cesium.defined(extras.ion) &&
          Cesium.defined(extras.ion.defaultStyle)
        ) {
          tileset.style = new Cesium.Cesium3DTileStyle(extras.ion.defaultStyle);
          console.log("Style bawaan berhasil diterapkan.");
        }

        console.log("Gaussian Splat berhasil dimuat!");
      } catch (error) {
        console.error("Gagal memuat:", error);
      }
    }

    // Jalankan fungsinya
    loadGaussianSplat();
  </script>
</body>
</html>
